<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRA Studio</title>
    <link rel="stylesheet" href="/static/style.css?v=8">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <nav id="sidebar">
        <a href="#artists" class="nav-item active" data-page="artists" title="Artists">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
        <a href="#train" class="nav-item" data-page="train" title="Train">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </a>
        <a href="#generate" class="nav-item" data-page="generate" title="Generate">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </a>
        <a href="#library" class="nav-item" data-page="library" title="Library">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="6" height="18" rx="1"/><rect x="9" y="3" width="6" height="18" rx="1"/><rect x="16" y="3" width="6" height="18" rx="1"/></svg>
        </a>
    </nav>
    <main id="content">
        <div id="page-artists" class="page"></div>
        <div id="page-train" class="page"></div>
        <div id="page-generate" class="page"></div>
        <div id="page-library" class="page"></div>
    </main>
    <div id="now-playing">
        <div class="np-info">
            <div>
                <div class="np-title" id="np-title">-</div>
                <div class="np-meta" id="np-meta">-</div>
            </div>
        </div>
        <div class="np-controls">
            <button class="np-play" id="np-play" onclick="npToggle()">▶</button>
            <div class="np-progress">
                <span class="np-time" id="np-cur">0:00</span>
                <div class="np-bar" onclick="npSeek(event)"><div class="np-bar-fill" id="np-fill"></div></div>
                <span class="np-time" id="np-dur">0:00</span>
            </div>
        </div>
        <div class="np-vol"></div>
    </div>
    <audio id="global-audio"></audio>
    <div id="toast"></div>
    <script src="/static/app.js?v=8"></script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js');</script>
</body>
</html>
